name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace (editable, mock-mode — no Azure credentials needed)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/academy-core -e packages/academy-services \
                      -e packages/academy-scenarios-hrsd -e apps/academy-cli \
                      -e apps/academy-api pytest ruff httpx

      - name: Lint
        run: ruff check .

      - name: Tests (all scenarios end-to-end + API + M365 package integrity)
        run: pytest -q

      - name: Icons stay reproducible
        run: |
          python scripts/make_icons.py
          git diff --exit-code m365/appPackage/color.png m365/appPackage/outline.png

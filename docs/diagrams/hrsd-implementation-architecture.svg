  <text class="s" x="120" y="1382" fill="#000">Shaded outer boxes are parent services; inner boxes are their sub-components. An arrow ending on a parent's edge targets the sub-component named in its label.</text>
  <text class="s" x="120" y="1396" fill="#000">C1–C29 cross-reference the integration inventory (§3 of the architecture document). Lines are routed orthogonally without crossings; the single hop arc (C12 over C14) marks lines that pass without connecting.</text>

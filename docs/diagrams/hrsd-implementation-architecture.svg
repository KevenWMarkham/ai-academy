  <text x="24" y="26" font-size="19" font-weight="800" fill="#000">HR Service Delivery — Implementation Architecture<tspan fill="#86BC25">.</tspan></text>
  <text x="24" y="44" font-size="11" fill="#63666A">Microsoft Azure · Fabric + Purview anchor · MAF agent runtime · M365 Copilot surface — connection ids (C1–C29) map to the integration table (§3)</text>

  <!-- ===================== layer bands ===================== -->
  <rect class="band"    x="20" y="60"   width="1460" height="200"/>
  <rect class="bandAlt" x="20" y="300"  width="1460" height="210"/>
  <rect class="band"    x="20" y="550"  width="1460" height="160"/>
  <rect class="bandAlt" x="20" y="750"  width="1460" height="220"/>
  <rect class="band"    x="20" y="990"  width="1460" height="100"/>
  <rect class="bandAlt" x="20" y="1110" width="1460" height="180"/>
  <text class="bandLbl" x="34" y="77">1 · SOURCES &amp; INGESTION</text>
  <text class="bandLbl" x="34" y="317">2 · STORAGE — ONELAKE MEDALLION + SERVING STORES</text>
  <text class="bandLbl" x="34" y="567">3 · PROCESSING &amp; AI COMPUTE</text>
  <text class="bandLbl" x="34" y="770">4 · ORCHESTRATION &amp; AGENT RUNTIME</text>
  <text class="bandLbl" x="34" y="1007">5 · GOVERNANCE · IDENTITY · OBSERVABILITY</text>
  <text class="bandLbl" x="34" y="1127">6 · PRESENTATION &amp; CONSUMPTION</text>


  <text class="s" x="170" y="216">batch pipelines · Copy activity,</text>
  <text class="s" x="170" y="229">schedules, watermark deltas</text>

  <rect class="box" x="520" y="180" width="260" height="65"/>
  <text class="t" x="530" y="200">Fabric Eventstream</text>
  <text class="s" x="530" y="216">Real-Time hub · case lifecycle</text>
  <text class="s" x="530" y="229">events (create/update/close)</text>


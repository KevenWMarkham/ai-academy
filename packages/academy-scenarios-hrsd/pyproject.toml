[project]
name = "academy-scenarios-hrsd"
version = "0.1.0"
description = "AI Academy — the 9 HR Service Delivery (Tier-0) scenarios, runnable"
requires-python = ">=3.11"
dependencies = ["academy-core", "academy-services"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/academy_hrsd"]

[tool.uv.sources]
academy-core = { workspace = true }
academy-services = { workspace = true }

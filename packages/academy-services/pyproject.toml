[project]
name = "academy-services"
version = "0.1.0"
description = "AI Academy service adapters — mock-first Azure AI service integrations"
requires-python = ">=3.11"
dependencies = ["academy-core"]

[project.optional-dependencies]
live = ["openai>=1.40"]
agents = ["agent-framework"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/academy_services"]

[tool.uv.sources]
academy-core = { workspace = true }
